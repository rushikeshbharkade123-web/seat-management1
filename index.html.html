<!DOCTYPE html>
<html>
<head>
<title>Administrative Officer Seat Management</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #000;
    --header1: #2c3e50;
    --header2: #4ca1af;
    --seat: #2ecc71;
    --occupied1: #8e44ad;
    --occupied2: #5e3370;
}

body.dark {
    --bg: #1e1e2f;
    --card: #2c2c3e;
    --text: #f1f1f1;
    --header1: #141e30;
    --header2: #243b55;
    --seat: #27ae60;
    --occupied1: #6c3483;
    --occupied2: #4a235a;
}

body {
    font-family:'Segoe UI';
    margin:0;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: linear-gradient(135deg,var(--header1),var(--header2));
    color:white;
    padding:10px 20px;
}

.search-box {
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
}

.search-box input {
    padding:6px;
    border-radius:5px;
    border:none;
    width:220px;
}

.theme-btn, select.theme-btn {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

#suggestions {
    position:absolute;
    top:38px;
    left:0;
    width:260px;
    max-height:220px;
    overflow-y:auto;
    background:var(--card);
    border-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    display:none;
    z-index:999;
}

.suggestion-item {
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #eee;
    font-size:12px;
    color:var(--text);
}

.suggestion-item:hover {
    background:#f1f1f1;
}

.hall {
    margin:20px;
    background:var(--card);
    padding:15px;
    border-radius:10px;
}

.layout {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.row { display:flex; gap:40px; }

.section {
    display:grid;
    grid-template-columns:repeat(8,60px);
    gap:8px;
}

.seat {
    width:60px;
    height:60px;
    background:var(--seat);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-radius:8px;
    cursor:pointer;
    font-size:10px;
    position:relative;
    transition: transform 0.25s ease;
}

.occupied {
    background: linear-gradient(135deg,var(--occupied1),var(--occupied2));
}

.highlight {
    transform: scale(1.08);
    z-index: 10;
}

.status-dot {
    width:8px;
    height:8px;
    border-radius:50%;
    position:absolute;
    top:5px;
    right:5px;
}

#popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box {
    background:var(--card);
    width:360px;
    border-radius:14px;
    padding:20px;
    color:var(--text);
}

.popup-title {
    font-size:18px;
    font-weight:600;
    text-align:center;
    margin-bottom:10px;
}

.form-group { margin-bottom:10px; }

.form-group label {
    font-size:12px;
    display:block;
    margin-bottom:4px;
}

.form-group input,
.form-group select {
    width:100%;
    padding:9px;
    border-radius:6px;
    border:1px solid #ddd;
}

.btn-row {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn {
    flex:1;
    padding:9px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.save { background:#2ecc71; color:white; }
.delete { background:#e74c3c; color:white; }
.close { background:#7f8c8d; color:white; }

.walkway { width:40px; }

body.dark .theme-btn,
body.dark select.theme-btn {
    background:#2c2c3e;
    color:white;
}

.theme-btn,
select.theme-btn {
    background:white;
    color:black;
}
</style>
</head>

<body>

<div class="header">
    <div>🧑‍💼 Administrative Officer Seat Management</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search name / mobile / seat">

        <button class="theme-btn" onclick="toggleTheme()">🌙/☀️</button>

        <select class="theme-btn" onchange="filterSeats(this.value)">
            <option value="all">All</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="empty">Empty</option>
        </select>

        <div id="suggestions"></div>
    </div>
</div>

<div class="hall">
<h3>Hall 1 (A Seats)</h3>
<div id="layout1" class="layout"></div>
</div>

<div class="hall">
<h3>Hall 2 (B Seats)</h3>
<div id="layout2" class="layout"></div>
</div>

<div id="popup">
<div class="popup-box">

<div class="popup-title" id="popupSeat">Seat</div>

<div class="form-group">
<label>Name</label>
<input id="pName">
</div>

<div class="form-group">
<label>Mobile</label>
<input id="pMobile">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="pDate">
</div>

<div class="form-group">
<label>Fee</label>
<input id="pFee">
</div>

<div class="form-group">
<label>Status</label>
<select id="pStatus">
<option>Paid</option>
<option>Pending</option>
</select>
</div>

<div class="btn-row">
<button class="btn save" onclick="saveSeat()">Save</button>
<button class="btn delete" onclick="deleteSeat()">Delete</button>
<button class="btn close" onclick="closePopup()">Close</button>
</div>

</div>
</div>

<script>

let seatData = JSON.parse(localStorage.getItem("seats")) || {};
let currentKey = null;

/* ✅ AUTO STATUS UPDATE (1 MONTH RULE) */
function updateSeatStatusByDate(){
    let today = new Date();

    Object.keys(seatData).forEach(key=>{
        let d = seatData[key];

        if(d.date){
            let bookingDate = new Date(d.date);

            let nextMonthDate = new Date(bookingDate);
            let day = bookingDate.getDate();

            nextMonthDate.setMonth(nextMonthDate.getMonth() + 1);

            // Fix month overflow (important)
            if(nextMonthDate.getDate() !== day){
                nextMonthDate.setDate(0);
            }

            if(today >= nextMonthDate){
                d.status = "Pending";
            }
        }
    });

    localStorage.setItem("seats", JSON.stringify(seatData));
}

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

/* FILTER */
function filterSeats(type){
    document.querySelectorAll(".seat").forEach(seat => {
        let key = seat.dataset.key;
        let data = seatData[key];

        if(type === "all") seat.style.display = "flex";
        else if(type === "empty") seat.style.display = data ? "none" : "flex";
        else if(type === "paid") seat.style.display = (data && data.status === "Paid") ? "flex" : "none";
        else if(type === "pending") seat.style.display = (data && data.status === "Pending") ? "flex" : "none";
    });
}

/* SEARCH (same as before) */
const searchInput = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

searchInput.addEventListener("input", function () {
    let val = this.value.trim().toLowerCase();

    suggestions.innerHTML = "";
    suggestions.style.display = "none";

    document.querySelectorAll(".seat").forEach(s=>s.classList.remove("highlight"));

    if(!val) return;

    let found = false;

    document.querySelectorAll(".seat").forEach(seatEl=>{
        let key = seatEl.dataset.key;
        let seatNo = key.split("_")[1];
        let prefix = key.startsWith("hall1") ? "A" : "B";
        let seatLabel = prefix + seatNo;

        let d = seatData[key];
        let name = d ? (d.name||"") : "";
        let mobile = d ? (d.mobile||"") : "";

        if(name.toLowerCase().includes(val) || mobile.includes(val) || seatLabel.toLowerCase().includes(val)){
            found = true;
            seatEl.classList.add("highlight");

            let div = document.createElement("div");
            div.className = "suggestion-item";
            div.innerHTML = `<b>${name || "Empty Seat"}</b><br>Seat: ${seatLabel}`;

            div.onclick = function(){
                searchInput.value = seatLabel;
                suggestions.style.display = "none";
                seatEl.scrollIntoView({behavior:"smooth"});
            };

            suggestions.appendChild(div);
        }
    });

    if(found) suggestions.style.display = "block";
});

document.addEventListener("click", e=>{
    if(!e.target.closest(".search-box")){
        suggestions.style.display = "none";
    }
});

/* POPUP + SAVE DELETE same */
function openPopup(seat,key,n){
    currentKey = key;
    popup.style.display = "flex";

    let d = seatData[key];
    let prefix = key.startsWith("hall1") ? "A" : "B";

    popupSeat.innerText = "Seat " + prefix + n;

    if(d){
        pName.value = d.name;
        pMobile.value = d.mobile;
        pDate.value = d.date;
        pFee.value = d.fee;
        pStatus.value = d.status;
    } else {
        pName.value="";
        pMobile.value="";
        pDate.value="";
        pFee.value="";
        pStatus.value="Paid";
    }
}

function saveSeat(){
    seatData[currentKey]={
        name:pName.value,
        mobile:pMobile.value,
        date:pDate.value,
        fee:pFee.value,
        status:pStatus.value
    };

    localStorage.setItem("seats",JSON.stringify(seatData));
    location.reload();
}

function deleteSeat(){
    delete seatData[currentKey];
    localStorage.setItem("seats",JSON.stringify(seatData));
    location.reload();
}

function closePopup(){
    popup.style.display="none";
}

/* SEATS */
function createSeat(n,hall){
    let key = hall+"_"+n;
    let prefix = hall==="hall1" ? "A" : "B";

    let seat = document.createElement("div");
    seat.className="seat";
    seat.dataset.key=key;

    if(seatData[key]){
        let d=seatData[key];
        seat.classList.add("occupied");

        seat.innerHTML = `<div>${prefix}${n}</div><div>${d.name.split(" ")[0]}</div>`;

        let dot=document.createElement("div");
        dot.className="status-dot";
        dot.style.background=(d.status==="Paid")?"limegreen":"orange";
        seat.appendChild(dot);

    } else {
        seat.innerHTML = `<div>${prefix}${n}</div>`;
    }

    seat.onclick=()=>openPopup(seat,key,n);
    return seat;
}

/* GENERATE */
function generateHall(id,hall){
    let layout=document.getElementById(id);
    let n=1;

    while(n<=140){
        let row=document.createElement("div");
        row.className="row";

        let left=document.createElement("div");
        left.className="section";

        let right=document.createElement("div");
        right.className="section";

        for(let i=0;i<8 && n<=140;i++) left.appendChild(createSeat(n++,hall));
        for(let i=0;i<8 && n<=140;i++) right.appendChild(createSeat(n++,hall));

        row.appendChild(left);
        row.appendChild(document.createElement("div")).className="walkway";
        row.appendChild(right);

        layout.appendChild(row);
    }
}

/* ✅ CALL AUTO UPDATE FIRST */
updateSeatStatusByDate();

generateHall("layout1","hall1");
generateHall("layout2","hall2");

</script>

</body>
</html>
